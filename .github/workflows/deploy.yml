name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write      # needed to create/update releases
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Job 1: Upload large assets to a GitHub Release ──────────
  release-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with LFS
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull LFS objects
        run: git lfs pull

      - name: Upload GLB + HDR to release v1.0.0-assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-assets
          name: "3D Assets"
          body: "Large binary assets (GLB model + HDR environment) served via GitHub Releases CDN for GitHub Pages compatibility."
          files: |
            BMW_BIke_configurator_1.glb
            neon_photostudio_4k.hdr

  # ── Job 2: Deploy HTML + JSON to GitHub Pages ───────────────
  deploy-pages:
    needs: release-assets
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (no LFS needed — assets come from release)
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
